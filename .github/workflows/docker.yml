name: Build & Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sylvaincostes/portfolio
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    if: github.repository == 'SylvainCostes/Portfolio-ouiok' && github.ref == 'refs/heads/master'
    steps:
      - name: Pull latest image and recreate container
        run: |
          docker pull sylvaincostes/portfolio:latest
          docker stop portfolio-app || true
          docker rm portfolio-app || true
          docker run -d \
            --name portfolio-app \
            --restart unless-stopped \
            -p 4321:4321 \
            -e HOST=0.0.0.0 \
            -e PORT=4321 \
            -e GITHUB_ACCESS_TOKEN="${{ secrets.GITHUB_ACCESS_TOKEN }}" \
            -e MAPTILER_API_KEY="${{ secrets.MAPTILER_API_KEY }}" \
            -e MONKEYTYPE_API_KEY="${{ secrets.MONKEYTYPE_API_KEY }}" \
            sylvaincostes/portfolio:latest
